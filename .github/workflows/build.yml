name: Build with VS2022

on:
  push:
    branches: [ main, refactor/code-cleanup ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Restore NuGet packages
      run: nuget restore TSP_GA.sln -NoCache

    - name: Install raylib manually (just in case)
      run: nuget install raylib -Version 5.5.0 -OutputDirectory packages

    - name: Build Solution
      run: msbuild TSP_GA.sln /p:Configuration=Release /p:Platform=x64 /p:RestorePackages=false